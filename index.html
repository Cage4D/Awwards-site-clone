<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>awwards-site-clone</title>
  </head>
  <body>
    <header class="header">
      <nav class="nav-bar">
        <div class="nav-start">
          <div class="logo">
            <img src="./src/assets/logo.svg" alt="" />
          </div>
          <div class="welcome">
            <img src="./src/assets/w.svg" alt="W" />
            <img src="./src/assets/e.svg" alt="E" />
            <img src="./src/assets/l.svg" alt="L" />
            <img src="./src/assets/c.svg" alt="C" />
            <img src="./src/assets/o.svg" alt="O" />
            <img src="./src/assets/m.svg" alt="M" />
            <img src="./src/assets/e.svg" alt="E" />
          </div>
        </div>
        <div class="nav-middle">
          <ul>
            <li>Features</li>
            <li>Pricing</li>
            <li>Events</li>
            <li>About</li>
            <li>Blog</li>
          </ul>
        </div>
        <div class="nav-end">
          <button>Support</button>
          <button>Login</button>
          <button>Demo</button>
        </div>
      </nav>
      <section class="hero">
        <h2>Captivate & Convert</h2>
        <p class="hero-about">
          A webinar platform designed for marketers to host jaw-dropping
          experiences that drive revenue.
        </p>
        <div class="btn-group">
            <button class="hero-demo">Demo</button>
            <button class="how-it-works">
                <img src="./src/assets/play_btn.svg" alt="play">
                <p>How it works</p>
            </button>
        </div>
      </section>
      <section class="header-background-img">
        <img src="./src/assets/header-bg-image.png" alt="Hero Background Image">
      </section>
      <section class="header-bottom">
        <div class="side-text"></div>
        <div class="companies-logo"></div>
      </section>
    </header>
  </body>
</html>
